name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - 'LICENSE'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            artifact-name: zettel-windows-x86_64
          - os: macos-14
            rust-target: aarch64-apple-darwin
            artifact-name: zettel-macos-arm64
          - os: macos-13
            rust-target: x86_64-apple-darwin
            artifact-name: zettel-macos-x86_64
          - os: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            artifact-name: zettel-linux-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # ---------- System deps (per OS) ----------

      - name: Install Linux build deps (WebKit, GTK, Cairo, Pango)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libcairo2-dev libpango1.0-dev libgdk-pixbuf-2.0-dev \
            libffi-dev libssl-dev pkg-config

      - name: Install macOS WeasyPrint deps
        if: startsWith(matrix.os, 'macos')
        run: brew install pango gdk-pixbuf libffi cairo

      - name: Install GTK3 runtime (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $url = "https://github.com/tschoonj/GTK-for-Windows-Runtime-Environment-Installer/releases/download/2022-01-04/gtk3-runtime-3.24.31-2022-01-04-ts-win64.exe"
          $exe = "$env:RUNNER_TEMP\gtk-runtime.exe"
          Invoke-WebRequest -Uri $url -OutFile $exe
          Start-Process -FilePath $exe -ArgumentList "/S" -Wait
          echo "C:\Program Files\GTK3-Runtime Win64\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      # ---------- Toolchains ----------

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ---------- Build sidecar ----------

      - name: Install Python sidecar deps
        working-directory: sidecar
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller==6.11.1

      - name: Build sidecar (PyInstaller)
        working-directory: sidecar
        run: python build.py

      # ---------- Build frontend + Tauri ----------

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app (Linux — .deb only)
        if: matrix.os == 'ubuntu-22.04'
        run: pnpm tauri build --target ${{ matrix.rust-target }} --bundles deb

      - name: Build Tauri app
        if: matrix.os != 'ubuntu-22.04'
        run: pnpm tauri build --target ${{ matrix.rust-target }}

      # ---------- Upload ----------

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.deb
          if-no-files-found: warn

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          draft: true
          generate_release_notes: true
