name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - 'LICENSE'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            artifact-name: zettel-windows-x86_64
          - os: macos-14
            rust-target: aarch64-apple-darwin
            artifact-name: zettel-macos-arm64
          # macOS Intel (macos-13) bewusst deaktiviert: GitHub-Actions-Free-Tier
          # liefert Intel-Runner derzeit nur mit 1h+ Queue-Zeit. Apple-Silicon
          # deckt 2025+ den Großteil der Zielgruppe. Wieder reinholen via
          # workflow_dispatch oder neue Matrix-Zeile, sobald das Capacity-Thema
          # entspannt ist (oder ein User explizit Intel braucht).
          - os: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            artifact-name: zettel-linux-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # ---------- System deps (per OS) ----------

      - name: Install Linux build deps (WebKit, GTK, Cairo, Pango)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libcairo2-dev libpango1.0-dev libgdk-pixbuf-2.0-dev \
            libffi-dev libssl-dev pkg-config

      - name: Install macOS WeasyPrint deps
        if: startsWith(matrix.os, 'macos')
        run: brew install pango gdk-pixbuf libffi cairo

      - name: Install GTK3 runtime (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $url = "https://github.com/tschoonj/GTK-for-Windows-Runtime-Environment-Installer/releases/download/2022-01-04/gtk3-runtime-3.24.31-2022-01-04-ts-win64.exe"
          $exe = "$env:RUNNER_TEMP\gtk-runtime.exe"
          Invoke-WebRequest -Uri $url -OutFile $exe
          Start-Process -FilePath $exe -ArgumentList "/S" -Wait
          echo "C:\Program Files\GTK3-Runtime Win64\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      # ---------- Toolchains ----------

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ---------- Build sidecar ----------

      - name: Install Python sidecar deps
        working-directory: sidecar
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller==6.11.1

      - name: Build sidecar (PyInstaller)
        working-directory: sidecar
        run: python build.py

      # ---------- Build frontend + Tauri ----------

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app (Linux — .deb only)
        if: matrix.os == 'ubuntu-22.04'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --target ${{ matrix.rust-target }} --bundles deb,updater

      - name: Build Tauri app
        if: matrix.os != 'ubuntu-22.04'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --target ${{ matrix.rust-target }}

      # ---------- Upload ----------

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.msi.sig
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.nsis.zip
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.nsis.zip.sig
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.app.tar.gz
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.app.tar.gz.sig
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.AppImage.sig
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.deb
          if-no-files-found: warn

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Build latest.json (updater feed)
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          read_sig() { [ -f "$1" ] && cat "$1" || echo ""; }

          # Windows: NSIS .exe.sig + .nsis.zip.sig live next to the artifacts in dist/zettel-windows-x86_64/
          WIN_SIG_FILE="$(find dist/zettel-windows-x86_64 -name '*.nsis.zip.sig' | head -n1 || true)"
          WIN_NSIS_ZIP="$(find dist/zettel-windows-x86_64 -name '*.nsis.zip' ! -name '*.sig' | head -n1 || true)"
          WIN_SIG="$(read_sig "$WIN_SIG_FILE")"
          WIN_URL=""
          if [ -n "$WIN_NSIS_ZIP" ]; then
            WIN_URL="https://github.com/${REPO}/releases/download/${TAG}/$(basename "$WIN_NSIS_ZIP")"
          fi

          MAC_SIG_FILE="$(find dist/zettel-macos-arm64 -name '*.app.tar.gz.sig' | head -n1 || true)"
          MAC_TARBALL="$(find dist/zettel-macos-arm64 -name '*.app.tar.gz' ! -name '*.sig' | head -n1 || true)"
          MAC_SIG="$(read_sig "$MAC_SIG_FILE")"
          MAC_URL=""
          if [ -n "$MAC_TARBALL" ]; then
            MAC_URL="https://github.com/${REPO}/releases/download/${TAG}/$(basename "$MAC_TARBALL")"
          fi

          # Linux: AppImage updater. .deb-only builds won't produce one — left empty if missing.
          LIN_SIG_FILE="$(find dist/zettel-linux-x86_64 -name '*.AppImage.sig' | head -n1 || true)"
          LIN_APPIMAGE="$(find dist/zettel-linux-x86_64 -name '*.AppImage' ! -name '*.sig' | head -n1 || true)"
          LIN_SIG="$(read_sig "$LIN_SIG_FILE")"
          LIN_URL=""
          if [ -n "$LIN_APPIMAGE" ]; then
            LIN_URL="https://github.com/${REPO}/releases/download/${TAG}/$(basename "$LIN_APPIMAGE")"
          fi

          export VERSION PUB_DATE WIN_SIG WIN_URL MAC_SIG MAC_URL LIN_SIG LIN_URL TAG REPO
          python3 - <<'PY' > latest.json
          import json, os
          platforms = {}
          if os.environ.get("WIN_URL"):
              platforms["windows-x86_64"] = {"signature": os.environ.get("WIN_SIG", ""), "url": os.environ["WIN_URL"]}
          if os.environ.get("MAC_URL"):
              platforms["darwin-aarch64"] = {"signature": os.environ.get("MAC_SIG", ""), "url": os.environ["MAC_URL"]}
          if os.environ.get("LIN_URL"):
              platforms["linux-x86_64"] = {"signature": os.environ.get("LIN_SIG", ""), "url": os.environ["LIN_URL"]}
          print(json.dumps({
              "version": os.environ["VERSION"],
              "notes": f"See https://github.com/{os.environ['REPO']}/releases/tag/{os.environ['TAG']}",
              "pub_date": os.environ["PUB_DATE"],
              "platforms": platforms,
          }, indent=2))
          PY
          cat latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*
            latest.json
          draft: true
          generate_release_notes: true
