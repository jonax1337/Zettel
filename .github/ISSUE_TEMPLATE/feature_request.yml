name: Feature Request
description: Vorschlag für ein neues Feature oder eine Verbesserung
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Welches Problem löst das Feature?
      placeholder: Aktuell muss ich jedes Mal manuell..., das ist mühsam, weil...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Vorgeschlagene Lösung
      placeholder: Eine Option in den Einstellungen, die...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternativen, die du in Betracht gezogen hast
  - type: checkboxes
    id: scope
    attributes:
      label: Passt das in den Scope?
      description: "Zettel ist explizit kein Buchhaltungs-Tool. Non-Goals (kein Banking, kein ELSTER-Upload, kein Cloud-Sync, keine Mobile-App, kein SMTP-Versand, kein Scan-OCR, keine Telemetrie, keine vollständige doppelte Buchhaltung) sind in der README und in CONTRIBUTING.md gelistet."
      options:
        - label: Ich habe die Non-Goals gelesen (README → „Was Zettel nicht ist") und mein Vorschlag ist kein explizites Non-Goal.
          required: true
